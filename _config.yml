title: ビットコイン経済研究所
# 英語名。今はトップの <title> だけで使う（他の使いどころは未定）。
title_en: Bitcoin Economics Research Institute
tagline: ビットコインを市場・経済・社会の側から読む。論考と、日次のマーケットレポート
description: ビットコインを市場・経済・社会の側から読む。論考と、日次のマーケットレポート。
url: https://mueck0711.github.io
baseurl: /notes
lang: ja

github_username: mueck0711
x_username: mueck0711

# card.png の無いページ（articles・トップ・一覧・旧レポート）の既定 og:image。
og_image: /assets/img/og-default.png

# GitHub Pages のブランチビルドでは既定で有効。ローカルの検証ビルドと挙動を揃えるため明示する。
#   optional-front-matter … front matter の無い .md を描画する（BMA が生成する
#                            market-reports/*/README.md は front matter を持たない）
#   readme-index          … README.md をそのフォルダの index.html にする
plugins:
  - jekyll-optional-front-matter
  - jekyll-readme-index

# front matter が無いファイルにもレイアウトを与えるための唯一の口。
# 記事側に手を入れずに済むので、BMA の生成物をそのまま載せられる。
defaults:
  - scope:
      path: ''
    values:
      layout: page
  - scope:
      path: articles
    values:
      layout: post
  - scope:
      path: market-reports
    values:
      layout: post
  # トップはカードタイルを持つ専用レイアウト。
  - scope:
      path: README.md
    values:
      layout: home
  # 各フォルダの一覧ページは記事ではないので page に戻す（より長いパスが勝つ）。
  - scope:
      path: articles/README.md
    values:
      layout: page
  - scope:
      path: market-reports/README.md
    values:
      layout: page

kramdown:
  input: GFM
  auto_ids: true
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
