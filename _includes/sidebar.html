{%- assign url = page.url -%}
<aside id="sidebar">
  <header class="profile-wrapper">
    {%- comment -%}
      GitHub のプロフィール画像を直接参照する。プロフィールを差し替えると
      こちらも自動で追従する（リポジトリに複製を置くと片方だけ古くなる）。
    {%- endcomment -%}
    <a href="{{ '/' | relative_url }}" class="avatar">
      <img src="https://github.com/{{ site.github_username }}.png?size=160"
           alt="{{ site.github_username }}" width="160" height="160" loading="lazy">
    </a>
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    <p class="site-subtitle">{{ site.tagline }}</p>
  </header>

  <nav class="nav-wrapper">
    <ul class="nav">
      <li class="nav-item{% if url == '/' %} active{% endif %}">
        <a href="{{ '/' | relative_url }}">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>
          </svg>
          <span>ホーム</span>
        </a>
      </li>
      <li class="nav-item{% if url contains '/essays' %} active{% endif %}">
        <a href="{{ '/essays/' | relative_url }}">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4h9a3 3 0 0 1 3 3v13a2 2 0 0 0-2-2H4zm16 0h-2a3 3 0 0 0-1 .17V18a2 2 0 0 1 2 2h1a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1z"/>
          </svg>
          <span>読み物</span>
        </a>
      </li>
      <li class="nav-item{% if url contains '/market-reports' %} active{% endif %}">
        <a href="{{ '/market-reports/' | relative_url }}">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3h2v16a2 2 0 0 0 2 2h14v2H7a4 4 0 0 1-4-4zm5 12V9h3v6zm5 0V5h3v10zm5 0v-4h3v4z"/>
          </svg>
          <span>マーケットレポート</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-bottom">
    <a href="https://github.com/{{ site.github_username }}/notes" class="sidebar-btn" aria-label="GitHub" target="_blank" rel="noopener">
      <svg class="mode-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.9 10.9c.6.1.8-.2.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.1.1 1.7 1.2 1.7 1.2 1 1.8 2.7 1.3 3.4 1 .1-.7.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.2 1.2a11 11 0 0 1 5.8 0c2.2-1.5 3.2-1.2 3.2-1.2.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.3c0 .4.2.7.8.6A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5z"/>
      </svg>
    </a>
  </div>
</aside>
