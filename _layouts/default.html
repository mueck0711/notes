<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ja' }}">
<head>
  {%- include head.html -%}
</head>
<body>
  {%- include sidebar.html -%}

  <div id="main-wrapper">
    <header id="topbar">
      <button id="sidebar-trigger" type="button" aria-label="メニューを開く">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
      <nav class="breadcrumb" aria-label="パンくず">
        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
        {%- if page.url contains '/articles' %}
          <span class="sep">/</span><a href="{{ '/articles/' | relative_url }}">読み物</a>
        {%- elsif page.url contains '/market-reports' %}
          <span class="sep">/</span><a href="{{ '/market-reports/' | relative_url }}">マーケットレポート</a>
        {%- endif -%}
      </nav>
    </header>

    <main id="main">
      {{ content }}
    </main>

    <footer id="footer">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}. Hosted on GitHub Pages.</p>
    </footer>
  </div>

  <div id="sidebar-mask"></div>
  <button id="back-to-top" type="button" aria-label="上に戻る">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </button>

  <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
</body>
</html>
